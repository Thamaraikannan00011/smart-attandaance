<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartAttend — Students</title>
  <link rel="manifest" href="../manifest.json"/>
  <meta name="theme-color" content="#0c0c0c"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="SmartAttend"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css"/>
  <link rel="stylesheet" href="../css/reset.css"/>
  <link rel="stylesheet" href="../css/layout.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
        <span class="logo-text">SmartAttend</span>
      </div>
      <div class="logo-sub">Attendance Management</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Navigation</div>
      <a href="../index.html" class="nav-link"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>Dashboard</a>
      <a href="attendance.html" class="nav-link"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Mark Attendance</a>
      <a href="students.html" class="nav-link active"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Students</a>
      <a href="report.html" class="nav-link"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Reports</a>
    </nav>
    <div class="sidebar-footer"><span class="version">v1.0.0</span><span class="status-dot online"></span></div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main-wrap">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menuToggle"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div class="topbar-breadcrumb"><span>SmartAttend</span><span class="sep">/</span><span class="current">Students</span></div>
      </div>
      <div class="topbar-right">
        <div class="search-wrap">
          <svg class="search-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Search students…"/>
        </div>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div>
          <h1 class="page-header-title">Students</h1>
          <p class="page-header-sub" id="studentCountLabel"></p>
        </div>
        <div class="page-header-actions">
          <button class="btn btn-primary" id="btnAddStudent">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Student
          </button>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="table">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:inline;vertical-align:middle;margin-right:5px"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          Table
        </button>
        <button class="tab-btn" data-tab="cards">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:inline;vertical-align:middle;margin-right:5px"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Cards
        </button>
      </div>

      <!-- Table view -->
      <div class="tab-panel active" id="tab-table">
        <div class="card card-flush">
          <table class="data-table" id="studentTable">
            <thead><tr>
              <th class="sortable" data-col="name">Student</th>
              <th class="sortable" data-col="rollNo">Roll No.</th>
              <th class="sortable" data-col="email">Email</th>
              <th class="sortable" data-col="phone">Phone</th>
              <th class="sortable" data-col="percentage">Attendance</th>
              <th style="text-align:right;">Actions</th>
            </tr></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Cards view -->
      <div class="tab-panel" id="tab-cards">
        <div id="cardsGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;"></div>
      </div>
    </main>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalStudent">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalStudentTitle">Add Student</div>
      <button class="modal-close" data-modal-close><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId"/>
      <div class="form-row mb-4">
        <div class="form-group">
          <label class="form-label" for="fieldName">Full Name <span style="color:var(--gray-300)">*</span></label>
          <input class="form-input" id="fieldName" placeholder="e.g. Aarthi S."/>
        </div>
        <div class="form-group">
          <label class="form-label" for="fieldRoll">Roll Number <span style="color:var(--gray-300)">*</span></label>
          <input class="form-input" id="fieldRoll" placeholder="e.g. CS001"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="fieldEmail">Email</label>
          <input class="form-input" id="fieldEmail" type="email" placeholder="email@college.edu"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="fieldPhone">Phone</label>
          <input class="form-input" id="fieldPhone" placeholder="10-digit number"/>
        </div>
      </div>
      <p id="formError" style="font-size:12px;font-weight:500;color:var(--black);margin-top:12px;display:none;padding:10px 12px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius);"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-modal-close>Cancel</button>
      <button class="btn btn-primary" id="btnSaveStudent">Save Student</button>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div class="modal-overlay" id="modalDelete">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Remove Student</div>
      <button class="modal-close" data-modal-close><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <p style="font-size:14px;color:var(--gray-600);line-height:1.6;">Are you sure you want to remove <strong id="deleteStudentName" style="color:var(--black);"></strong>? All attendance records for this student will be lost.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-modal-close>Cancel</button>
      <button class="btn btn-danger" id="btnConfirmDelete">Remove Student</button>
    </div>
  </div>
</div>

<script type="module">
import { registerSW, initOfflineBanner } from '../js/pwa.js';
registerSW(); initOfflineBanner();
import { MOCK_STUDENTS } from '../js/utils/mock.js';
import { openModal, closeModal, initModals } from '../js/components/modal.js';
import { toastSuccess, toastError } from '../js/components/toast.js';

initModals();
let students = [...MOCK_STUDENTS];
let deleteId = null;
let sortCol = 'name', sortDir = 1;

function getFiltered(q = '') {
  const l = q.toLowerCase();
  return q ? students.filter(s => s.name.toLowerCase().includes(l) || s.rollNo.toLowerCase().includes(l) || s.email.toLowerCase().includes(l)) : [...students];
}

function renderTable(q = '') {
  const list = getFiltered(q).sort((a,b) => {
    const av = (a[sortCol]||'').toString().toLowerCase();
    const bv = (b[sortCol]||'').toString().toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
  document.getElementById('studentCountLabel').textContent = `${list.length} student${list.length!==1?'s':''} enrolled`;
  document.getElementById('tableBody').innerHTML = list.map(s => {
    const pctColor = s.percentage >= 75 ? 'var(--black)' : 'var(--gray-400)';
    return `<tr>
      <td><div class="student-cell">
        <img class="avatar" src="${s.photo}" alt="${s.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="avatar" style="display:none">${s.name[0]}</div>
        <div><div class="student-name">${s.name}</div></div>
      </div></td>
      <td class="font-mono text-sm text-muted">${s.rollNo}</td>
      <td class="text-sm text-muted">${s.email}</td>
      <td class="text-sm font-mono text-muted">${s.phone}</td>
      <td>
        <div class="flex items-center gap-2">
          <div class="progress-wrap" style="width:64px;"><div class="progress-fill" style="width:${s.percentage}%"></div></div>
          <span class="font-mono text-xs" style="color:${pctColor};font-weight:600;">${s.percentage}%</span>
        </div>
      </td>
      <td class="td-actions">
        <button class="btn btn-ghost btn-sm btn-icon" onclick="editStudent(${s.id})" title="Edit">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn btn-ghost btn-sm btn-icon" onclick="confirmDelete(${s.id},'${s.name}')" title="Remove">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>
        </button>
      </td>
    </tr>`;}).join('');
}

function renderCards(q = '') {
  const list = getFiltered(q);
  document.getElementById('cardsGrid').innerHTML = list.map(s => {
    const pctColor = s.percentage >= 75 ? 'var(--black)' : 'var(--gray-400)';
    return `<div class="card" style="padding:22px 18px;text-align:center;transition:box-shadow var(--transition),transform var(--transition);" onmouseenter="this.style.boxShadow='var(--shadow)';this.style.transform='translateY(-2px)'" onmouseleave="this.style.boxShadow='';this.style.transform=''">
      <img class="avatar avatar-xl" src="${s.photo}" alt="${s.name}" style="margin:0 auto 12px;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="avatar avatar-xl" style="display:none;margin:0 auto 12px;">${s.name[0]}</div>
      <div class="student-name" style="font-size:14px;margin-bottom:2px;">${s.name}</div>
      <div class="student-roll">${s.rollNo}</div>
      <div style="margin:14px 0 10px;">
        <div class="progress-wrap" style="height:4px;"><div class="progress-fill" style="width:${s.percentage}%"></div></div>
      </div>
      <div style="font-size:13px;font-family:var(--font-mono);font-weight:600;color:${pctColor};margin-bottom:14px;">${s.percentage}%</div>
      <div style="display:flex;gap:6px;justify-content:center;">
        <button class="btn btn-secondary btn-sm" onclick="editStudent(${s.id})" style="flex:1;">Edit</button>
        <button class="btn btn-ghost btn-sm btn-icon" onclick="confirmDelete(${s.id},'${s.name}')">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        </button>
      </div>
    </div>`;}).join('');
}

function renderAll(q = '') { renderTable(q); renderCards(q); }

// Sort
document.querySelectorAll('#studentTable thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    if (sortCol === th.dataset.col) sortDir *= -1;
    else { sortCol = th.dataset.col; sortDir = 1; }
    document.querySelectorAll('thead th').forEach(t => t.classList.remove('sort-asc','sort-desc'));
    th.classList.add(sortDir===1?'sort-asc':'sort-desc');
    renderTable(document.getElementById('searchInput').value);
  });
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  });
});

document.getElementById('searchInput').addEventListener('input', e => renderAll(e.target.value));

document.getElementById('btnAddStudent').addEventListener('click', () => {
  ['editId','fieldName','fieldRoll','fieldEmail','fieldPhone'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('modalStudentTitle').textContent = 'Add Student';
  document.getElementById('formError').style.display = 'none';
  openModal('modalStudent');
});

window.editStudent = id => {
  const s = students.find(s => s.id===id); if (!s) return;
  document.getElementById('editId').value   = id;
  document.getElementById('fieldName').value  = s.name;
  document.getElementById('fieldRoll').value  = s.rollNo;
  document.getElementById('fieldEmail').value = s.email;
  document.getElementById('fieldPhone').value = s.phone;
  document.getElementById('modalStudentTitle').textContent = 'Edit Student';
  document.getElementById('formError').style.display = 'none';
  openModal('modalStudent');
};

document.getElementById('btnSaveStudent').addEventListener('click', () => {
  const name=document.getElementById('fieldName').value.trim();
  const roll=document.getElementById('fieldRoll').value.trim();
  const errEl=document.getElementById('formError');
  if (!name||!roll) { errEl.textContent='Name and Roll Number are required.'; errEl.style.display='block'; return; }
  errEl.style.display='none';
  const id=document.getElementById('editId').value;
  if (id) {
    const idx=students.findIndex(s=>s.id==id);
    if (idx>-1) Object.assign(students[idx],{name,rollNo:roll,email:document.getElementById('fieldEmail').value.trim(),phone:document.getElementById('fieldPhone').value.trim()});
    toastSuccess('Student updated.');
  } else {
    students.push({id:Date.now(),name,rollNo:roll,email:document.getElementById('fieldEmail').value.trim(),phone:document.getElementById('fieldPhone').value.trim(),photo:'',percentage:0});
    toastSuccess('Student added.');
  }
  closeModal('modalStudent'); renderAll();
});

window.confirmDelete = (id,name) => { deleteId=id; document.getElementById('deleteStudentName').textContent=name; openModal('modalDelete'); };
document.getElementById('btnConfirmDelete').addEventListener('click', () => {
  students=students.filter(s=>s.id!==deleteId);
  closeModal('modalDelete'); toastSuccess('Student removed.'); renderAll();
});

document.getElementById('menuToggle').addEventListener('click', () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('show'); });
document.getElementById('sidebarOverlay').addEventListener('click', () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); });

renderAll();
</script>
</body>
</html>
