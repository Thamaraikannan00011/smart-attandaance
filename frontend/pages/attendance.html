<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartAttend — Mark Attendance</title>
  <link rel="manifest" href="../manifest.json"/>
  <meta name="theme-color" content="#0c0c0c"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="SmartAttend"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css"/>
  <link rel="stylesheet" href="../css/reset.css"/>
  <link rel="stylesheet" href="../css/layout.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
        <span class="logo-text">SmartAttend</span>
      </div>
      <div class="logo-sub">Attendance Management</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Navigation</div>
      <a href="../index.html" class="nav-link">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        Dashboard
      </a>
      <a href="attendance.html" class="nav-link active">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        Mark Attendance
      </a>
      <a href="students.html" class="nav-link">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Students
      </a>
      <a href="report.html" class="nav-link">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Reports
      </a>
    </nav>
    <div class="sidebar-footer"><span class="version">v1.0.0</span><span class="status-dot online"></span></div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main-wrap">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menuToggle"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div class="topbar-breadcrumb">
          <span>SmartAttend</span><span class="sep">/</span><span class="current">Mark Attendance</span>
        </div>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="topbarDate"></span>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div>
          <h1 class="page-header-title">Mark Attendance</h1>
          <p class="page-header-sub" id="pageSubtitle"></p>
        </div>
        <div class="page-header-actions">
          <button class="btn btn-secondary" id="btnMarkAll">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            All Present
          </button>
          <button class="btn btn-secondary" id="btnClear">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            Clear
          </button>
          <button class="btn btn-primary" id="btnSave">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17,21 17,13 7,13"/><polyline points="7,3 7,8 15,8"/></svg>
            Save Attendance
          </button>
        </div>
      </div>

      <!-- Controls bar -->
      <div class="card card-sm mb-4" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:8px;">
          <label style="font-size:12px;font-weight:600;color:var(--gray-500);white-space:nowrap;">Date</label>
          <input type="date" class="form-input" id="dateSelect" style="width:155px;"/>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <label style="font-size:12px;font-weight:600;color:var(--gray-500);white-space:nowrap;">Period</label>
          <select class="form-select" id="periodSelect" style="width:170px;">
            <option value="1">Period 1 — 9:00 AM</option>
            <option value="2">Period 2 — 10:00 AM</option>
            <option value="3">Period 3 — 11:00 AM</option>
            <option value="4">Period 4 — 12:00 PM</option>
            <option value="5">Period 5 — 2:00 PM</option>
          </select>
        </div>
        <div style="height:24px;width:1px;background:var(--gray-150);"></div>
        <!-- Live counters -->
        <div style="display:flex;gap:16px;align-items:center;" id="liveCounters"></div>
      </div>

      <!-- Progress bar -->
      <div style="margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
          <span style="font-size:12px;color:var(--gray-400);">Progress</span>
          <span style="font-size:12px;font-family:var(--font-mono);color:var(--gray-500);" id="progressLabel">0 / 6</span>
        </div>
        <div class="progress-wrap"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
      </div>

      <!-- Student list -->
      <div class="card card-flush">
        <div style="padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-100);">
          <div style="font-size:13px;font-weight:600;color:var(--black);">
            Students <span style="color:var(--gray-300);font-weight:400;" id="studentCount"></span>
          </div>
          <div class="search-wrap">
            <svg class="search-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" class="search-input" id="searchInput" placeholder="Search…"/>
          </div>
        </div>
        <div id="attendanceList" style="padding:8px 12px 16px;"></div>
      </div>

      <!-- Summary footer -->
      <div class="card card-sm mt-4" id="summaryFooter"></div>
    </main>
  </div>
</div>

<script type="module">
import { registerSW, initOfflineBanner, queueAttendance, triggerSync } from '../js/pwa.js';
registerSW(); initOfflineBanner();
import { today, formatDateLong, nowDisplay } from '../js/utils/date.js';
import { toastSuccess, toastError } from '../js/components/toast.js';
import { listStudents, listAttendanceByDate, markAttendance } from '../js/api.js';

document.getElementById('dateSelect').value = today();
document.getElementById('topbarDate').textContent = nowDisplay();
document.getElementById('pageSubtitle').textContent = formatDateLong(today());

let attendance = {};
let students = [];

function uiToApiStatus(uiStatus) {
  if (uiStatus === 'Present') return 'PRESENT';
  if (uiStatus === 'Late') return 'LATE';
  return 'ABSENT';
}

async function loadStudentsAndExisting(dateStr) {
  try {
    const apiStudents = await listStudents();
    students = apiStudents.map((s) => ({ id: s.id, name: s.fullName, rollNo: s.rollNo, photo: '' }));

    // preload existing attendance for that date (best-effort)
    attendance = {};
    const rows = await listAttendanceByDate(dateStr);
    rows.forEach((r) => {
      const stu = students.find((s) => s.rollNo === r.studentRollNo);
      if (!stu) return;
      const ui =
        r.status === 'PRESENT' ? 'Present' :
        r.status === 'LATE' ? 'Late' :
        r.status === 'ABSENT' ? 'Absent' : '';
      if (ui) attendance[stu.id] = ui;
    });

    renderList(document.getElementById('searchInput').value);
  } catch (e) {
    toastError(e?.message || 'Failed to load students.');
    students = [];
    attendance = {};
    renderList();
  }
}

function renderList(q = '') {
  const list = q ? students.filter(s =>
    s.name.toLowerCase().includes(q.toLowerCase()) ||
    s.rollNo.toLowerCase().includes(q.toLowerCase())) : students;

  document.getElementById('studentCount').textContent = `(${list.length})`;

  if (!list.length) {
    document.getElementById('attendanceList').innerHTML = `
      <div class="empty-state">
        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="color:var(--gray-200)"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <p class="empty-title">No students found</p>
      </div>`;
    return;
  }

  document.getElementById('attendanceList').innerHTML = list.map(s => {
    const st = attendance[s.id] || '';
    const rowCls = st === 'Present' ? 'marked-present' : st === 'Absent' ? 'marked-absent' : st === 'Late' ? 'marked-late' : '';
    return `
    <div class="attendance-row ${rowCls}" id="row-${s.id}">
      <div class="student-cell">
        <img class="avatar" src="${s.photo}" alt="${s.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="avatar" style="display:none">${s.name[0]}</div>
        <div>
          <div class="student-name">${s.name}</div>
          <div class="student-roll">${s.rollNo}</div>
        </div>
      </div>
      <div class="status-btns">
        <button class="status-btn ${st==='Present'?'active-present':''}" onclick="setStatus(${s.id},'Present')">Present</button>
        <button class="status-btn ${st==='Late'?'active-late':''}" onclick="setStatus(${s.id},'Late')">Late</button>
        <button class="status-btn ${st==='Absent'?'active-absent':''}" onclick="setStatus(${s.id},'Absent')">Absent</button>
      </div>
    </div>`;
  }).join('');
  updateStats();
}

window.setStatus = (id, status) => { attendance[id] = status; renderList(document.getElementById('searchInput').value); };

function updateStats() {
  const vals = Object.values(attendance);
  const present = vals.filter(v => v==='Present').length;
  const late    = vals.filter(v => v==='Late').length;
  const absent  = vals.filter(v => v==='Absent').length;
  const marked  = vals.length;
  const total   = students.length;
  const pct     = total ? Math.round(marked/total*100) : 0;

  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${marked} / ${total}`;

  document.getElementById('liveCounters').innerHTML = `
    <div style="display:flex;align-items:center;gap:5px;">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--dot-present);"></span>
      <span style="font-size:12px;font-weight:600;color:var(--black);">${present}</span>
      <span style="font-size:11px;color:var(--gray-400);">Present</span>
    </div>
    <div style="display:flex;align-items:center;gap:5px;">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--dot-late);"></span>
      <span style="font-size:12px;font-weight:600;color:var(--black);">${late}</span>
      <span style="font-size:11px;color:var(--gray-400);">Late</span>
    </div>
    <div style="display:flex;align-items:center;gap:5px;">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--dot-absent);"></span>
      <span style="font-size:12px;font-weight:600;color:var(--black);">${absent}</span>
      <span style="font-size:11px;color:var(--gray-400);">Absent</span>
    </div>`;

  document.getElementById('summaryFooter').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
      <div>
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-400);font-weight:600;margin-bottom:6px;">Session summary</div>
        <div style="display:flex;gap:20px;font-size:13px;">
          <span><b style="color:var(--black);font-weight:600;">${present}</b> <span style="color:var(--gray-500);">Present</span></span>
          <span><b style="color:var(--black);font-weight:600;">${late}</b> <span style="color:var(--gray-500);">Late</span></span>
          <span><b style="color:var(--black);font-weight:600;">${absent}</b> <span style="color:var(--gray-500);">Absent</span></span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:13px;color:var(--gray-400);">${marked} of ${total} marked</span>
        ${marked === total ? `<span class="badge badge-present" style="font-size:11px;">Complete</span>` : ''}
      </div>
    </div>`;
}

document.getElementById('btnMarkAll').addEventListener('click', () => {
  students.forEach(s => attendance[s.id] = 'Present');
  renderList(); toastSuccess('All students marked present.');
});
document.getElementById('btnClear').addEventListener('click', () => {
  attendance = {}; renderList(); toastSuccess('Cleared.');
});
document.getElementById('btnSave').addEventListener('click', async () => {
  const marked = Object.keys(attendance).length;
  if (marked < students.length) { toastError(`Please mark all ${students.length} students first.`); return; }
  const dateStr = document.getElementById('dateSelect').value;
  const periodId = Number(document.getElementById('periodSelect').value) || null;
  const payload = students.map(s => ({
    date: dateStr,
    studentRollNo: s.rollNo,
    status: uiToApiStatus(attendance[s.id]),
    periodId,
  }));
  if (navigator.onLine) {
    try {
      await Promise.all(payload.map((p) => markAttendance(p)));
      toastSuccess('Attendance saved successfully!');
    } catch (e) {
      toastError(e?.message || 'Failed to save attendance.');
    }
  } else {
    await queueAttendance(payload); await triggerSync();
    toastSuccess('Saved offline — syncs when reconnected.');
  }
});
document.getElementById('searchInput').addEventListener('input', e => renderList(e.target.value));
document.getElementById('dateSelect').addEventListener('change', () => {
  const d = document.getElementById('dateSelect').value;
  document.getElementById('pageSubtitle').textContent = formatDateLong(d);
  loadStudentsAndExisting(d);
});
document.getElementById('menuToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
});
document.getElementById('sidebarOverlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
});

loadStudentsAndExisting(today());
</script>
</body>
</html>
