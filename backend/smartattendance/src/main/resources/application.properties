spring.application.name=smartattendance

server.port=${PORT:8080}

# Production datasource (PostgreSQL recommended)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartattendance}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:smartattendance}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:change-me}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

spring.h2.console.enabled=false

logging.level.org.springframework.web=INFO
